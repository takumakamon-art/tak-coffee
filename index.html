    // --- Gemini API (本物の通信関数) ---
    const fetchGeminiSummary = async (memo, flavors, apiKey) => {
      if (!apiKey) return "APIキー未設定";
      if (!memo && (!flavors || flavors.length === 0)) return "特記事項なし";
      
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const prompt = `以下のコーヒー抽出の感想やフレーバー情報から、10文字以内で端的な要約タイトルを生成してください。出力はカギカッコ無しの要約テキストのみにしてください。\n感想: ${memo}\nフレーバー: ${flavors.join(',')}`;
      try {
        const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text.trim().replace(/['"]/g, '');
      } catch (err) { return "要約生成エラー"; }
    };

    const fetchGeminiRecipe = async (recipeInput, apiKey) => {
      if (!apiKey) throw new Error("APIキーが未設定です");
      
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const prompt = `
        あなたはプロのバリスタAIです。以下の条件から最適なコーヒー抽出レシピをJSON形式で提案してください。
        【条件】
        豆: ${recipeInput.beans || "おまかせ"}
        焙煎度: ${recipeInput.roast || "おまかせ"}
        ドリッパー: ${recipeInput.dripper || "おまかせ"}
        フィルター: ${recipeInput.filter || "おまかせ"}
        豆の量: ${recipeInput.beansWeight ? recipeInput.beansWeight + "g" : "15g"}
        味の希望: ${recipeInput.tasteGoal || "豆本来の個性を引き出す"}
        ※挽き目はTimemore C3のクリック数（13〜22程度）で指定してください。
      `;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "JSON形式で出力。プロパティ: beansWeight(数値), waterWeight(数値), temp(数値), grind(数値), roast(文字列), dripper(文字列), filter(文字列), methodName(文字列: 例「甘み引き出し4投メソッド」), advice(文字列), steps(配列: {time:文字列, water:文字列, description:文字列})" }] },
        generationConfig: { responseMimeType: "application/json" }
      };

      const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await response.json();
      return JSON.parse(data.candidates[0].content.parts[0].text);
    };

    // --- パース・UIヘルパー ---
    const parseCSVLine = (text) => {
      let ret = [], keep = false, item = "";
      for(let i=0; i<text.length; i++) {
        let c = text[i];
        if (c === '"') { if (keep && text[i+1] === '"') { item += '"'; i++; } else { keep = !keep; } }
        else if (c === ',' && !keep) { ret.push(item); item = ""; }
        else { item += c; }
      }
      ret.push(item); return ret;
    };

    const SwipeToDelete = ({ children, onDelete }) => {
      const [currentX, setCurrentX] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const startX = useRef(0);
      const handleTouchStart = (e) => { startX.current = e.touches[0].clientX; setIsDragging(true); };
      const handleTouchMove = (e) => {
        if (!isDragging) return;
        const diff = e.touches[0].clientX - startX.current;
        if (diff < 0) setCurrentX(Math.max(diff, -100));
      };
      const handleTouchEnd = () => {
        setIsDragging(false);
        if (currentX <= -70) { if(window.confirm('この記録を削除しますか？')) onDelete(); }
        setCurrentX(0);
      };
      return (
        <div className="relative mb-4 rounded-xl overflow-hidden shadow-sm bg-red-500">
          <div className="absolute inset-0 flex items-center justify-end pr-6 text-white font-bold" style={{zIndex: 0}}>
            <span className="flex items-center gap-1"><Icons.Trash /> 削除</span>
          </div>
          <div 
            onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
            className="bg-white relative w-full h-full rounded-xl"
            style={{ transform: `translateX(${currentX}px)`, transition: isDragging ? 'none' : 'transform 0.3s ease-out', zIndex: 1 }}
          >
            {children}
          </div>
        </div>
      );
    };

        if (savedKey) setApiKey(savedKey);

        const savedLogs = localStorage.getItem('brewProfileLogs');
        if (savedLogs && JSON.parse(savedLogs).length > 0) setLogs(JSON.parse(savedLogs));
        else setLogs(initialLogs);
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) localStorage.setItem('brewProfileLogs', JSON.stringify(logs));
      }, [logs, isLoaded]);

      // APIキーの保存
      const handleSaveApiKey = (e) => {
        e.preventDefault();
        localStorage.setItem('geminiApiKey', apiKey);
        setShowSettings(false);
        // レポート再生成を促すためクリア
        setInsightReport(null);
      };

      // インサイトの自動生成
      useEffect(() => {
        if (activeTab === 'insight' && logs.length > 0 && !insightReport) {
           fetchComprehensiveInsight(logs, apiKey).then(setInsightReport);
        }
      }, [activeTab, logs, apiKey, insightReport]);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [chatMessages]);

      // --- タイマー ---
      useEffect(() => {
        if (isRunning) timerRef.current = setInterval(() => setTime(prev => prev + 10), 10);
        else clearInterval(timerRef.current);
        return () => clearInterval(timerRef.current);
      }, [isRunning]);

      const formatTime = (ms) => {
        const mins = Math.floor(ms / 60000).toString().padStart(2, '0');
        const secs = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
        const millis = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
        return `${mins}:${secs}.${millis}`;
      };
      const formatSplit = (ms) => `+${(ms / 1000).toFixed(1)}s`;

      const handleTimerToggle = () => setIsRunning(!isRunning);
      const handleTimerLap = () => {
        const splitTime = time - (laps.length > 0 ? laps[0].time : 0);
        setLaps([{ id: Date.now(), time: time, split: splitTime }, ...laps]);
      };
      const handleTimerReset = () => { setIsRunning(false); setTime(0); setLaps([]); };

      // --- フィルタ・ソート ---
      const filteredAndSortedLogs = useMemo(() => {
        let result = [...logs];
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          result = result.filter(log => log.beans.toLowerCase().includes(q) || log.roastery.toLowerCase().includes(q) || log.memo.toLowerCase().includes(q) || (log.summary && log.summary.toLowerCase().includes(q)));
        }
        if (filterDripper !== 'all') result = result.filter(log => log.dripper === filterDripper);
        result.sort((a, b) => {
          if (sortOption === 'date-desc') return b.id - a.id;
          if (sortOption === 'date-asc') return a.id - b.id;
          if (sortOption === 'score-desc') return b.score - a.score;
          if (sortOption === 'score-asc') return a.score - b.score;
          return 0;
        });
        return result;
      }, [logs, searchQuery, sortOption, filterDripper]);

      // --- アクション ---
      const handleSaveRecord = () => {
        if(!formData.beans) { alert("豆の種類を入力してください"); return; }
        const newLogId = Date.now();
        const newLog = {
          ...formData, id: newLogId,
          date: new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }),
          time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}),
          summary: apiKey ? '✨ 要約生成中...' : '要約なし (APIキー未設定)'
        };
        setLogs([newLog, ...logs]);
        setActiveTab('history');
        setFormData({ ...formData, beans: '', score: 3.0, memo: '', flavors: [] });
        
        if (apiKey) {
          fetchGeminiSummary(newLog.memo, newLog.flavors, apiKey).then(summary => {
            setLogs(prev => prev.map(l => l.id === newLogId ? { ...l, summary } : l));
          });
        }
      };

      const handleDeleteLog = (id) => setLogs(logs.filter(log => log.id !== id));
      const handleEditStart = (log) => { setEditingLogId(log.id); setEditFormData(log); };
      const handleEditCancel = () => { setEditingLogId(null); setEditFormData(null); };
      const handleEditSave = async () => {
        const id = editFormData.id;
        const originalLog = logs.find(l => l.id === id);
        let updatedLog = { ...editFormData };
        if (apiKey && (originalLog.memo !== updatedLog.memo || originalLog.flavors.join() !== updatedLog.flavors.join())) {
           updatedLog.summary = '✨ 要約再生成中...';
           setLogs(logs.map(l => l.id === id ? updatedLog : l));
           setEditingLogId(null);
           const newSummary = await fetchGeminiSummary(updatedLog.memo, updatedLog.flavors, apiKey);
           setLogs(prev => prev.map(l => l.id === id ? { ...l, summary: newSummary } : l));
        } else {
           setLogs(logs.map(l => l.id === id ? updatedLog : l));
           setEditingLogId(null);
        }
      };

      const handleExportCSV = () => {
        const headers = ["id", "date", "time", "beans", "roastery", "roast", "dripper", "filter", "beansWeight", "waterWeight", "temp", "grind", "score", "memo", "flavors", "summary"];
        const csvContent = [headers.join(","), ...logs.map(log => headers.map(h => {
              let val = log[h];
              if (h === 'flavors') val = val.join(';');
              if (typeof val === 'string') return `"${val.replace(/"/g, '""')}"`;
              return val;
          }).join(","))].join("\n");
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.download = "brew_profile.csv"; link.click();
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const lines = evt.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
          if (lines.length < 2) return alert("データがありません");
          const headers = lines[0].split(",");
          const newLogs = [];
          for (let i = 1; i < lines.length; i++) {
            const matches = parseCSVLine(lines[i]);
            const obj = {};
            headers.forEach((h, idx) => {
              let val = matches[idx] || "";
              if (['id', 'beansWeight', 'waterWeight', 'temp', 'grind'].includes(h)) val = parseInt(val) || 0;
              if (h === 'score') val = parseFloat(val) || 0;
              if (h === 'flavors') val = val ? val.split(';') : [];
              obj[h] = val;
            });
            newLogs.push(obj);
          }
          if(window.confirm(`${newLogs.length}件のデータをインポートします。上書きしますか？`)) setLogs(newLogs);
        };
        reader.readAsText(file);
      };

      // 本物のAIレシピ生成
      const generateAIRecipe = async () => {
        if (!apiKey) {

          return;

        setIsGenerating(true);

          const recipe = await fetchGeminiRecipe(recipeInput, apiKey);

                    <select className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]" value={formData.roast} onChange={e => setFormData({...formData, roast: e.target.value})}>
                      <option value="ライト">ライト</option><option value="ミディアム">ミディアム</option><option value="ダーク">ダーク</option>

                <section className="space-y-4">

                    <select className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]" value={formData.dripper} onChange={e => setFormData({...formData, dripper: e.target.value})}>
                      <option value="Origami">Origami</option><option value="Hario V60">Hario V60</option><option value="Kalita Wave">Kalita Wave</option>
                    </select>
                    <select className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]" value={formData.filter} onChange={e => setFormData({...formData, filter: e.target.value})}>
                      <option value="円錐">円錐</option><option value="ウェーブ">ウェーブ</option>
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-4">

                      <div className="flex justify-between items-center mb-2"><span className="text-xs text-[#8C7A6B]">挽き目 <br/><span className="text-[10px] opacity-70">(Timemore C3)</span></span><span className="font-bold text-lg">{formData.grind}</span></div>
                      <input type="range" min="10" max="30" value={formData.grind} onChange={e => setFormData({...formData, grind: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />

                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2"><span className="text-xs text-[#8C7A6B]">湯温</span><span className="font-bold text-lg">{formData.temp}℃</span></div>
                      <input type="range" min="80" max="100" value={formData.temp} onChange={e => setFormData({...formData, temp: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />

                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2"><span className="text-xs text-[#8C7A6B]">豆量</span><span className="font-bold text-lg">{formData.beansWeight}g</span></div>
                      <input type="range" min="10" max="40" value={formData.beansWeight} onChange={e => setFormData({...formData, beansWeight: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />

                      <div className="flex justify-between items-center mb-2"><span className="text-xs text-[#8C7A6B]">湯量</span><span className="font-bold text-lg">{formData.waterWeight}g</span></div>
                      <input type="range" min="150" max="600" step="10" value={formData.waterWeight} onChange={e => setFormData({...formData, waterWeight: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />

                <section className="space-y-4">
                  <div className="flex flex-wrap gap-2 mb-4">
                    {FLAVOR_TAGS.map(f => (

                        className={`px-3 py-1.5 rounded-full text-xs border ${formData.flavors.includes(f) ? 'bg-[#A67C52] text-white' : 'bg-white text-[#8C7A6B]'}`}>
                        {f}

                  <div className="bg-white p-4 rounded-xl border border-[#EAE3D5] space-y-4">
                    <div className="flex justify-between items-center">
                      <span className="text-sm text-[#8C7A6B]">総合評価</span>
                      <div className="flex items-center gap-2 text-yellow-500"><Icons.Star /><span className="font-bold text-lg text-[#3E3228]">{formData.score.toFixed(1)}</span></div>
                    </div>
                    <input type="range" min="1" max="5" step="0.1" value={formData.score} onChange={e => setFormData({...formData, score: parseFloat(e.target.value)})} className="w-full accent-yellow-500" />
                    <textarea placeholder="メモ（雑味、酸味の質など）" className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-lg p-3 text-sm focus:ring-[#A67C52]" rows="2" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})}></textarea>
                  </div>
                </section>
                <button onClick={handleSaveRecord} className="w-full bg-[#A67C52] hover:bg-[#8B653F] text-white font-bold py-4 rounded-xl shadow-md active:scale-95 flex justify-center items-center gap-2">
                  <Icons.Plus /> 記録を保存
                </button>

            {/* === RECIPE GENERATOR TAB (AI対応) === */}
            {activeTab === 'recipe' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="space-y-4 bg-white p-5 rounded-xl border border-[#EAE3D5] shadow-sm">
                  <input type="text" placeholder="豆の種類 (例: エチオピア 浅煎り)" className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:ring-[#A67C52]" value={recipeInput.beans} onChange={e => setRecipeInput({...recipeInput, beans: e.target.value})} />
                  
                  <div className="grid grid-cols-2 gap-3">
                    <select className="w-full bg-[#FDFBF7] border rounded-xl p-3 text-sm text-[#4A3B32]" value={recipeInput.roast} onChange={e => setRecipeInput({...recipeInput, roast: e.target.value})}>
                      <option value="">焙煎度: おまかせ</option><option value="ライト">ライト</option><option value="ミディアム">ミディアム</option><option value="ダーク">ダーク</option>

                    <select className="w-full bg-[#FDFBF7] border rounded-xl p-3 text-sm text-[#4A3B32]" value={recipeInput.dripper} onChange={e => setRecipeInput({...recipeInput, dripper: e.target.value})}>
                      <option value="">器具: おまかせ</option><option value="Origami">Origami</option><option value="Hario V60">Hario V60</option><option value="Kalita Wave">Kalita Wave</option>

                      <option value="">フィルター: おまかせ</option><option value="円錐">円錐</option><option value="ウェーブ">ウェーブ</option>

                    <div className="relative">

                      <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-[#8C7A6B]">g</span>

                {suggestedRecipe && !isGenerating && (

                            <div className="absolute -left-[27px] top-1 w-3 h-3 rounded-full bg-[#A67C52] ring-4 ring-white"></div>
                            <div className="flex items-baseline gap-2 mb-1">
                              <span className="font-bold text-[#3E3228] w-10">{step.time}</span>
                              <span className="text-xs font-semibold text-[#8C7A6B] bg-[#FDFBF7] px-2 py-0.5 rounded-md border border-[#EAE3D5]">~ {step.water}</span>
                            </div>
                            <div className="text-sm text-[#4A3B32]">{step.description}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* === HISTORY TAB === */}
            {activeTab === 'history' && (
              <div className="space-y-4 animate-in fade-in duration-300">
                <div className="flex justify-between items-center mb-4 bg-white p-3 rounded-xl border border-[#EAE3D5]">
                  <span className="text-sm font-bold text-[#8C7A6B]">全 {logs.length} 件</span>
                  <div className="flex gap-2">
                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1 text-xs bg-[#FDFBF7] border border-[#EAE3D5] px-3 py-2 rounded-lg text-[#4A3B32]"><Icons.Upload /> 読込</button>
                    <input type="file" accept=".csv" ref={fileInputRef} onChange={handleImportCSV} hidden />
                    <button onClick={handleExportCSV} className="flex items-center gap-1 text-xs bg-[#A67C52] text-white px-3 py-2 rounded-lg"><Icons.Download /> 書出</button>
                  </div>
                </div>

                <div className="bg-white p-3 rounded-xl border border-[#EAE3D5] mb-4 space-y-3 shadow-sm">
                  <div className="relative">
                    <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none text-[#8C7A6B]"><Icons.Search /></div>
                    <input type="text" placeholder="豆の種類、ロースタリー、メモで検索..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]" />
                  </div>
                  <div className="flex gap-2">
                    <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="flex-1 bg-[#FDFBF7] border border-[#EAE3D5] rounded-lg p-2 text-sm text-[#4A3B32]">
                      <option value="date-desc">新しい順</option><option value="date-asc">古い順</option><option value="score-desc">評価が高い順</option><option value="score-asc">評価が低い順</option>
                    </select>
                    <select value={filterDripper} onChange={(e) => setFilterDripper(e.target.value)} className="flex-1 bg-[#FDFBF7] border border-[#EAE3D5] rounded-lg p-2 text-sm text-[#4A3B32]">
                      <option value="all">全ドリッパー</option><option value="Origami">Origami</option><option value="Hario V60">Hario V60</option><option value="Kalita Wave">Kalita Wave</option>
                    </select>
                  </div>
                </div>
                
                {filteredAndSortedLogs.length === 0 ? <p className="text-center text-[#8C7A6B] py-10">条件に一致する記録がありません</p> : filteredAndSortedLogs.map((log) => {
                  const isExpanded = expandedIds.includes(log.id);
                  const isEditing = editingLogId === log.id;

                  if (isEditing) {
                    return (
                      <div key={log.id} className="bg-white p-4 rounded-xl border-2 border-[#A67C52] shadow-md space-y-4">
                        <div className="flex justify-between"><span className="text-xs font-bold text-[#A67C52]">編集モード</span></div>
                        <input type="text" value={editFormData.beans} onChange={e=>setEditFormData({...editFormData, beans: e.target.value})} className="w-full border p-2 rounded" placeholder="豆の名前"/>
                        <div className="grid grid-cols-4 gap-2">
                          <div><span className="text-[10px]">豆量</span><input type="number" value={editFormData.beansWeight} onChange={e=>setEditFormData({...editFormData, beansWeight: parseInt(e.target.value)})} className="w-full border p-1 rounded text-sm"/></div>
                          <div><span className="text-[10px]">湯量</span><input type="number" value={editFormData.waterWeight} onChange={e=>setEditFormData({...editFormData, waterWeight: parseInt(e.target.value)})} className="w-full border p-1 rounded text-sm"/></div>
                          <div><span className="text-[10px]">温度</span><input type="number" value={editFormData.temp} onChange={e=>setEditFormData({...editFormData, temp: parseInt(e.target.value)})} className="w-full border p-1 rounded text-sm"/></div>
                          <div><span className="text-[10px]">挽き目</span><input type="number" value={editFormData.grind} onChange={e=>setEditFormData({...editFormData, grind: parseInt(e.target.value)})} className="w-full border p-1 rounded text-sm"/></div>
                        </div>
                        <div><span className="text-[10px]">評価スコア</span><input type="range" min="1" max="5" step="0.1" value={editFormData.score} onChange={e=>setEditFormData({...editFormData, score: parseFloat(e.target.value)})} className="w-full"/></div>
                        <textarea value={editFormData.memo} onChange={e=>setEditFormData({...editFormData, memo: e.target.value})} className="w-full border p-2 rounded text-sm" rows="2"></textarea>
                        <div className="flex gap-2">
                          <button onClick={handleEditCancel} className="w-1/2 py-2 border rounded-lg">キャンセル</button>
                          <button onClick={handleEditSave} className="w-1/2 py-2 bg-[#A67C52] text-white rounded-lg">保存</button>
                        </div>
                      </div>
                    );
                  }

                  const shortBeansName = log.beans.length > 10 ? log.beans.substring(0, 10) + '...' : log.beans;

                  return (
                    <SwipeToDelete key={log.id} onDelete={() => handleDeleteLog(log.id)}>
                      <div className="p-4" onClick={() => setExpandedIds(prev => prev.includes(log.id) ? prev.filter(e=>e!==log.id) : [...prev, log.id])}>
                        <div className="flex justify-between items-center">
                          <div className="flex-1">
                            <div className="flex items-center gap-2">
                              <h3 className="font-bold text-lg leading-tight truncate" title={log.beans}>{shortBeansName}</h3>
                              <span className="text-xs bg-[#FDFBF7] px-2 py-0.5 rounded text-[#8C7A6B] border border-[#EAE3D5]">{log.roast}</span>
                            </div>
                            <div className="text-sm font-semibold text-[#A67C52] mt-1 flex items-center gap-1">
                               <Icons.Sparkles /> {log.summary || '要約中...'}
                            </div>
                          </div>
                          <div className="flex flex-col items-end gap-1">
                             <div className="flex items-center gap-1 text-yellow-500 font-bold"><Icons.Star />{log.score.toFixed(1)}</div>
                             <div className="text-gray-400">{isExpanded ? <Icons.ChevronUp/> : <Icons.ChevronDown/>}</div>
                          </div>
                        </div>
                        
                        {isExpanded && (
                          <div className="mt-4 pt-4 border-t border-[#EAE3D5] animate-in fade-in slide-in-from-top-2">
                            <div className="text-xs text-[#8C7A6B] mb-2">{log.date} {log.time} / {log.roastery}</div>
                            <div className="grid grid-cols-4 gap-2 mb-3 bg-[#FDFBF7] p-2 rounded-lg border border-[#EAE3D5]">
                              <div className="text-center"><div className="text-[10px] text-[#8C7A6B]">Ratio</div><div className="text-xs font-semibold">1:{Math.round(log.waterWeight/log.beansWeight)}</div></div>
                              <div className="text-center"><div className="text-[10px] text-[#8C7A6B]">Temp</div><div className="text-xs font-semibold">{log.temp}℃</div></div>
                              <div className="text-center"><div className="text-[10px] text-[#8C7A6B]">Grind</div><div className="text-xs font-semibold">{log.grind}</div></div>
                              <div className="text-center"><div className="text-[10px] text-[#8C7A6B]">Filter</div><div className="text-xs font-semibold truncate">{log.filter}</div></div>
                            </div>
                            <div className="flex flex-wrap gap-1 mb-2">
                              <span className="text-[10px] bg-[#EAE3D5] px-2 py-0.5 rounded-md">{log.dripper}</span>
                              {log.flavors && log.flavors.map(f => <span key={f} className="text-[10px] bg-white border border-[#EAE3D5] text-[#A67C52] px-2 py-0.5 rounded-full">{f}</span>)}
                            </div>
                            <div className="text-sm text-[#4A3B32] bg-white p-3 rounded-lg border border-[#EAE3D5] mb-3">"{log.memo}"</div>
                            <button onClick={(e) => { e.stopPropagation(); handleEditStart(log); }} className="w-full flex justify-center items-center gap-1 py-2 text-sm text-[#A67C52] border border-[#A67C52] rounded-lg">
                              <Icons.Edit /> 記録を編集する
                            </button>
                          </div>
                        )}
                      </div>
                    </SwipeToDelete>
                  );
                })}
              </div>
            )}

            {/* === INSIGHT TAB === */}
            {activeTab === 'insight' && (
              <div className="space-y-6 animate-in fade-in duration-300 flex flex-col h-full">
                <div className="bg-gradient-to-br from-[#3E3228] to-[#2A221B] p-5 rounded-2xl text-white shadow-md relative overflow-hidden flex-shrink-0">
                  <span className="absolute top-4 right-4 text-white/10 w-24 h-24"><Icons.Activity /></span>
                  <h2 className="text-xs font-bold text-white/60 uppercase tracking-widest mb-1 flex items-center gap-1">
                    <Icons.Sparkles /> Data Insight Report
                  </h2>
                  <div className="mt-3 bg-white/10 backdrop-blur-sm rounded-xl p-4 text-sm leading-relaxed border border-white/10 relative z-10 min-h-[100px]">
                    {insightReport ? insightReport : <div className="flex items-center gap-2 text-white/70"><Icons.Loader2 /> 分析をリクエスト中...</div>}
                  </div>
                </div>

                <div className="flex-1 flex flex-col bg-white rounded-2xl border border-[#EAE3D5] shadow-sm overflow-hidden mb-4">
                  <div className="bg-[#FDFBF7] px-4 py-3 border-b border-[#EAE3D5] flex-shrink-0">
                    <h3 className="text-sm font-bold text-[#8C7A6B]">AI Barista QA</h3>
                    <p className="text-[10px] text-[#A67C52]">あなたの過去のデータを基にアドバイスします</p>
                  </div>
                  
                  <div className="flex-1 p-4 overflow-y-auto space-y-4 bg-white min-h-[250px]">
                    {chatMessages.map((msg, i) => (
                      <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[85%] p-3 rounded-2xl text-sm ${msg.role === 'user' ? 'bg-[#A67C52] text-white rounded-tr-sm' : 'bg-[#FDFBF7] text-[#4A3B32] border border-[#EAE3D5] rounded-tl-sm'}`}>
                          {msg.content}
                        </div>
                      </div>
                    ))}
                    {isChatting && (
                      <div className="flex justify-start">
                        <div className="max-w-[80%] p-3 rounded-2xl text-sm bg-[#FDFBF7] text-[#4A3B32] border border-[#EAE3D5] rounded-tl-sm flex gap-1 items-center">
                           <div className="w-1.5 h-1.5 bg-[#A67C52] rounded-full animate-bounce"></div>
                           <div className="w-1.5 h-1.5 bg-[#A67C52] rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                           <div className="w-1.5 h-1.5 bg-[#A67C52] rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                        </div>
                      </div>
                    )}
                    <div ref={chatEndRef} />
                  </div>

                  <form onSubmit={handleChatSubmit} className="p-3 bg-[#FDFBF7] border-t border-[#EAE3D5] flex gap-2 flex-shrink-0">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="酸味を抑えるには？" className="flex-1 bg-white border border-[#EAE3D5] rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]" />
                    <button type="submit" disabled={!chatInput.trim() || isChatting} className="bg-[#A67C52] text-white p-2 w-10 h-10 rounded-full flex justify-center items-center disabled:opacity-50"><Icons.Send /></button>
                  </form>
                </div>
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-[#EAE3D5] pb-safe z-30 flex-shrink-0">
            <div className="flex justify-between items-center px-4 py-3">
              <button onClick={() => setActiveTab('record')} className={`flex flex-col items-center gap-1 w-1/4 ${activeTab === 'record' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}><Icons.Plus /><span className="text-[10px] font-bold">Record</span></button>
              <button onClick={() => setActiveTab('recipe')} className={`flex flex-col items-center gap-1 w-1/4 ${activeTab === 'recipe' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}><Icons.Compass /><span className="text-[10px] font-bold">Recipe</span></button>
              <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 w-1/4 ${activeTab === 'history' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}><Icons.List /><span className="text-[10px] font-bold">History</span></button>
              <button onClick={() => setActiveTab('insight')} className={`flex flex-col items-center gap-1 w-1/4 ${activeTab === 'insight' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}><Icons.Sparkles /><span className="text-[10px] font-bold">Insight</span></button>
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
