<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BrewProfile</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #FDFBF7;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden; /* 横スクロールを防止 */
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    input, textarea, select { -webkit-user-select: auto; user-select: auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Coffee: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
      Droplets: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.99 7 2.99s-2.29 6.07-2.29 6.07A4.46 4.46 0 0 0 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>,
      Thermometer: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>,
      List: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
      Sparkles: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M3 5h4"/></svg>,
      Star: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
      Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
      Compass: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
      Loader2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    };

    // PDFの全15件を網羅した初期データ
    const initialLogs = [
      { id: 15, date: '2026/04/04', time: '14:00', beans: 'ケニアAA', roastery: 'smack', roast: 'ライト', dripper: 'V60', filter: '円錐', beansWeight: 30, waterWeight: 450, temp: 93, grind: 17, score: 4.0, memo: 'クセ少', flavors: [] },
      { id: 14, date: '2026/04/04', time: '08:30', beans: 'Colombia', roastery: 'Post coffee', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.3, memo: '酸味か', flavors: [] },
      { id: 13, date: '2026/04/03', time: '07:30', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 25, waterWeight: 375, temp: 93, grind: 17, score: 4.1, memo: 'まろやか', flavors: [] },
      { id: 12, date: '2026/04/02', time: '12:50', beans: 'New life blend', roastery: 'Post coffee', roast: 'ダーク', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 85, grind: 17, score: 4.2, memo: '深煎り', flavors: [] },
      { id: 11, date: '2026/04/02', time: '07:40', beans: 'Colombia', roastery: 'Post coffee', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.5, memo: 'フローラル', flavors: [] },
      { id: 10, date: '2026/03/31', time: '07:40', beans: 'ケニアAA', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.0, memo: '酸味が', flavors: [] },
      { id: 9, date: '2026/03/29', time: '08:00', beans: 'ケニアAA', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.2, memo: 'まろやか', flavors: [] },
      { id: 8, date: '2026/03/28', time: '14:20', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.2, memo: 'まろやか', flavors: [] },
      { id: 7, date: '2026/03/28', time: '07:30', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'V60', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.5, memo: '味がくっきり', flavors: [] },
      { id: 6, date: '2026/03/27', time: '15:10', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.1, memo: '酸味が', flavors: [] },
      { id: 5, date: '2026/03/27', time: '08:30', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: 'ウェーブ', beansWeight: 20, waterWeight: 300, temp: 93, grind: 19, score: 4.0, memo: '酸味と', flavors: [] },
      { id: 4, date: '2026/03/26', time: '12:45', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.3, memo: 'あっさり', flavors: [] },
      { id: 3, date: '2026/03/26', time: '08:00', beans: 'キリマンジャロ', roastery: 'smack', roast: 'ライト', dripper: 'Origami', filter: 'ウェーブ', beansWeight: 20, waterWeight: 300, temp: 93, grind: 18, score: 4.1, memo: '少し雑', flavors: [] },
      { id: 2, date: '2026/03/22', time: '16:00', beans: 'ルワンダ', roastery: 'PostCoffee', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 17, waterWeight: 275, temp: 93, grind: 17, score: 4.3, memo: '柑橘系', flavors: [] },
      { id: 1, date: '2026/03/22', time: '07:45', beans: 'コロンビア', roastery: '珈琲問屋', roast: 'ライト', dripper: 'Origami', filter: '円錐', beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, score: 4.0, memo: '雑味かが', flavors: [] },
    ];

    const FLAVOR_TAGS = ['シトラス', 'ベリー', 'フローラル', 'フルーティー', 'ナッツ', 'チョコレート', 'キャラメル', 'スパイス', 'ハーブ', 'アーシー'];

    // スワイプで削除するためのコンポーネント
    const SwipeToDelete = ({ children, onDelete }) => {
      const [currentX, setCurrentX] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const startX = useRef(0);

      const handleTouchStart = (e) => {
        startX.current = e.touches[0].clientX;
        setIsDragging(true);
      };
      
      const handleTouchMove = (e) => {
        if (!isDragging) return;
        const diff = e.touches[0].clientX - startX.current;
        if (diff < 0) { // 左方向のみ許可
          setCurrentX(Math.max(diff, -100)); // 最大100pxまでスライド
        }
      };
      
      const handleTouchEnd = () => {
        setIsDragging(false);
        if (currentX <= -70) {
          if(window.confirm('この記録を削除しますか？')) {
            onDelete();
          }
        }
        setCurrentX(0); // 削除後・キャンセル後は元の位置に戻す
      };

      return (
        <div className="relative mb-4 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow bg-red-500">
          <div className="absolute inset-0 flex items-center justify-end pr-6 text-white font-bold" style={{zIndex: 0}}>
            <span className="flex items-center gap-1"><Icons.Trash /> 削除</span>
          </div>
          <div 
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
            className="bg-white p-4 relative w-full h-full rounded-xl"
            style={{ 
              transform: `translateX(${currentX}px)`, 
              transition: isDragging ? 'none' : 'transform 0.3s ease-out',
              zIndex: 1
            }}
          >
            {children}
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('recipe');
      const [logs, setLogs] = useState([]);
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => {
        const savedLogs = localStorage.getItem('brewProfileLogs');
        if (savedLogs && JSON.parse(savedLogs).length > 0) {
          setLogs(JSON.parse(savedLogs));
        } else {
          setLogs(initialLogs); // データが無い場合や初期化時はPDFの全データをセット
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) {
          localStorage.setItem('brewProfileLogs', JSON.stringify(logs));
        }
      }, [logs, isLoaded]);
      
      const [formData, setFormData] = useState({
        beans: '', roastery: '', roast: 'ライト', 
        dripper: 'Origami', filter: '円錐', 
        beansWeight: 20, waterWeight: 300, temp: 93, grind: 17, 
        score: 3.0, memo: '', flavors: []
      });

      // Recipe用の入力。空文字("")は「おまかせ」として扱う
      const [recipeInput, setRecipeInput] = useState({
        beans: '', roast: '', dripper: '', beansWeight: '', tasteGoal: ''
      });
      const [suggestedRecipe, setSuggestedRecipe] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);

      const handleDeleteLog = (id) => {
        setLogs(logs.filter(log => log.id !== id));
      };

      const generateAIFeedback = (log) => {
        let title = "";
        let message = "";
        if (!log) return { title: "データ不足", message: "記録を追加してください。" };
        
        if (log.filter === 'ウェーブ' && log.grind >= 18 && log.score < 4.3) {
          title = "挽き目とフィルターのバランス";
          message = "ウェーブフィルター使用時に挽き目が粗めに設定されています。Origamiの抜けの速さと合わさり、未抽出による雑味が出ている可能性があります。次回は挽き目を細かくするか、注ぎをゆっくりにしてみましょう。";
        } else if (log.beansWeight >= 25 && log.grind <= 17) {
          title = "バッチサイズに応じたメッシュ調整";
          message = "粉量が多いですが、挽き目が細かめです。粉の層が厚くなりお湯の抜けが遅延し、過抽出になっているかもしれません。挽き目を少し粗くしてみてください。";
        } else if (log.score >= 4.3) {
          title = "ベストプロファイルを発見！";
          message = `素晴らしい抽出です！現在の「${log.dripper} + ${log.filter} + 挽き目${log.grind} + ${log.temp}℃」のセッティングが、この豆のスイートスポットの可能性が高いです。`;
        } else {
          title = "微調整のアドバイス";
          message = "抽出は安定しています。さらなる甘みを引き出したい場合は、湯温を1〜2℃下げてみるか、1投目の蒸らし時間を長くするアプローチを試してみてください。";
        }
        return { title, message };
      };

      // オフラインAI: 空欄の項目を推測・補完してレシピを生成
      const generateOfflineRecipe = () => {
        setIsGenerating(true);
        setTimeout(() => {
          // --- 1. 焙煎度の推測（空欄の場合） ---
          let finalRoast = recipeInput.roast;
          if (!finalRoast) {
            const b = recipeInput.beans;
            if (b.includes('深') || b.includes('ダーク') || b.includes('マンデリン') || b.includes('ブラジル')) {
              finalRoast = 'ダーク';
            } else if (b.includes('浅') || b.includes('ライト') || b.includes('エチオピア') || b.includes('フルーティー')) {
              finalRoast = 'ライト';
            } else {
              finalRoast = 'ミディアム'; // 判別不能な場合のデフォルト
            }
          }

          // --- 2. 豆量の推測（空欄の場合） ---
          let finalWeight = parseInt(recipeInput.beansWeight);
          if (!finalWeight || isNaN(finalWeight)) {
            finalWeight = 15; // 1杯分の標準量として15gを提案
          }

          // --- 3. ドリッパーの推測（空欄の場合） ---
          let finalDripper = recipeInput.dripper;
          if (!finalDripper) {
            if (finalRoast === 'ライト') {
              finalDripper = 'Origami'; // 抜けがよくフレーバーが際立つ
            } else if (finalRoast === 'ダーク') {
              finalDripper = 'Kalita Wave'; // 安定してボディを引き出せる
            } else {
              finalDripper = 'Hario V60'; // オールマイティ
            }
          }

          // --- 4. 味の希望の推測（空欄の場合） ---
          let finalTasteGoal = recipeInput.tasteGoal;
          if (!finalTasteGoal) {
             if (finalRoast === 'ライト') {
                finalTasteGoal = "華やかな酸味と香りを最大限に引き出す";
             } else if (finalRoast === 'ダーク') {
                finalTasteGoal = "しっかりとしたコクと甘みを引き出す";
             } else {
                finalTasteGoal = "豆本来のバランスの良さを引き出す";
             }
          }

          // 基本パラメータの計算
          const ratio = finalRoast === 'ダーク' ? 14 : 15;
          let targetTemp = finalRoast === 'ダーク' ? 85 : 93;
          let targetGrind = 17;

          // 味の希望に応じた微調整
          if (finalTasteGoal.includes('甘') || finalTasteGoal.includes('コク')) {
            targetTemp -= 2;
            targetGrind -= 1;
          } else if (finalTasteGoal.includes('スッキリ') || finalTasteGoal.includes('酸味')) {
            targetTemp += 1;
            targetGrind += 1;
          }

          // アドバイスメッセージの構築
          let adviceMsg = "";
          if (!recipeInput.roast || !recipeInput.dripper || !recipeInput.beansWeight || !recipeInput.tasteGoal) {
            adviceMsg += `【AIによる自動提案】一部情報が未指定だったため、豆の特徴に合わせて最適な条件（${finalRoast} / ${finalDripper} / ${finalWeight}g）を提案しました。\n\n`;
          }
          adviceMsg += `目標「${finalTasteGoal}」に近づけるため、基本の1:${ratio}の比率をベースに、湯温を${targetTemp}℃、挽き目を${targetGrind}クリックに調整しました。`;

          setSuggestedRecipe({
            beansWeight: finalWeight,
            waterWeight: finalWeight * ratio,
            temp: targetTemp,
            grind: targetGrind,
            roast: finalRoast,
            dripper: finalDripper,
            advice: adviceMsg,
            steps: [
              { time: "0:00", water: `${Math.round(finalWeight * 2)}g`, description: "全体を均一に濡らし、40秒しっかり蒸らします。" },
              { time: "0:40", water: `${Math.round(finalWeight * 7)}g`, description: "中心から円を描くように優しく注ぎます。" },
              { time: "1:20", water: `${Math.round(finalWeight * ratio)}g`, description: "水位が下がりきる前に目標量まで注ぎ切り、抽出完了を待ちます。" }
            ]
          });
          setIsGenerating(false);
        }, 800); // 考えている風のラグ
      };

      const handleSave = () => {
        if(!formData.beans) {
          alert("豆の種類を入力してください");
          return;
        }
        const newLog = {
          ...formData,
          id: Date.now(),
          date: new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }),
          time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'})
        };
        setLogs([newLog, ...logs]);
        setActiveTab('history');
        setFormData({
          ...formData, beans: '', score: 3.0, memo: '', flavors: []
        });
      };

      const handleFlavorToggle = (flavor) => {
        setFormData(prev => ({
          ...prev,
          flavors: prev.flavors.includes(flavor) ? prev.flavors.filter(f => f !== flavor) : [...prev.flavors, flavor]
        }));
      };

      return (
        <div className="max-w-md mx-auto bg-[#FDFBF7] min-h-screen font-sans text-[#4A3B32] pb-24 shadow-lg relative">
          <header className="bg-[#FDFBF7] pt-safe pb-4 px-6 sticky top-0 z-10 border-b border-[#EAE3D5]">
            <div className="mt-4 flex items-center gap-2">
              <span className="text-[#A67C52]"><Icons.Coffee /></span>
              <h1 className="text-2xl font-bold tracking-wider text-[#3E3228]">BrewProfile</h1>
            </div>
            <p className="text-xs text-[#8C7A6B] mt-1">Personal Coffee Diary & AI Assistant</p>
          </header>

          <main className="p-6">
            
            {/* === RECORD TAB === */}
            {activeTab === 'record' && (
              <div className="space-y-8 animate-in fade-in duration-300">
                <section className="space-y-4">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest border-b border-[#EAE3D5] pb-2">Beans</h2>
                  <input 
                    type="text" placeholder="豆の種類 (例: コロンビア ピンクブルボン)" 
                    className="w-full bg-white border border-[#EAE3D5] rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                    value={formData.beans} onChange={e => setFormData({...formData, beans: e.target.value})}
                  />
                  <div className="grid grid-cols-2 gap-3">
                    <input 
                      type="text" placeholder="ロースタリー" 
                      className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={formData.roastery} onChange={e => setFormData({...formData, roastery: e.target.value})}
                    />
                    <select 
                      className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={formData.roast} onChange={e => setFormData({...formData, roast: e.target.value})}
                    >
                      <option value="ライト">ライトロースト</option>
                      <option value="ミディアム">ミディアムロースト</option>
                      <option value="ダーク">ダークロースト</option>
                    </select>
                  </div>
                </section>

                <section className="space-y-4">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest border-b border-[#EAE3D5] pb-2">Equipment & Recipe</h2>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <select 
                      className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={formData.dripper} onChange={e => setFormData({...formData, dripper: e.target.value})}
                    >
                      <option value="Origami">Origami</option>
                      <option value="V60">Hario V60</option>
                      <option value="Kalita Wave">Kalita Wave</option>
                    </select>
                    <select 
                      className="w-full bg-white border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={formData.filter} onChange={e => setFormData({...formData, filter: e.target.value})}
                    >
                      <option value="円錐">円錐フィルター</option>
                      <option value="ウェーブ">ウェーブフィルター</option>
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs text-[#8C7A6B] flex items-center gap-1"><span className="w-3 h-3"><Icons.Activity/></span> 挽き目</span>
                        <span className="font-bold">{formData.grind} <span className="text-[10px] font-normal">clicks</span></span>
                      </div>
                      <input type="range" min="10" max="30" value={formData.grind} onChange={e => setFormData({...formData, grind: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />
                    </div>
                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs text-[#8C7A6B] flex items-center gap-1"><span className="w-3 h-3"><Icons.Thermometer/></span> 湯温</span>
                        <span className="font-bold">{formData.temp}<span className="text-[10px] font-normal">℃</span></span>
                      </div>
                      <input type="range" min="80" max="100" value={formData.temp} onChange={e => setFormData({...formData, temp: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />
                    </div>
                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs text-[#8C7A6B]">豆量</span>
                        <span className="font-bold">{formData.beansWeight}<span className="text-[10px] font-normal">g</span></span>
                      </div>
                      <input type="range" min="10" max="40" value={formData.beansWeight} onChange={e => setFormData({...formData, beansWeight: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />
                    </div>
                    <div className="bg-white p-4 rounded-xl border border-[#EAE3D5]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs text-[#8C7A6B] flex items-center gap-1"><span className="w-3 h-3"><Icons.Droplets/></span> 湯量</span>
                        <span className="font-bold">{formData.waterWeight}<span className="text-[10px] font-normal">g</span></span>
                      </div>
                      <input type="range" min="150" max="600" step="10" value={formData.waterWeight} onChange={e => setFormData({...formData, waterWeight: parseInt(e.target.value)})} className="w-full accent-[#A67C52]" />
                    </div>
                  </div>
                </section>

                <section className="space-y-4">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest border-b border-[#EAE3D5] pb-2">Senses</h2>
                  <div className="flex flex-wrap gap-2 mb-4">
                    {FLAVOR_TAGS.map(flavor => (
                      <button 
                        key={flavor} onClick={() => handleFlavorToggle(flavor)}
                        className={`px-3 py-1.5 rounded-full text-xs transition-colors border ${formData.flavors.includes(flavor) ? 'bg-[#A67C52] text-white border-[#A67C52]' : 'bg-white text-[#8C7A6B] border-[#EAE3D5]'}`}
                      >
                        {flavor}
                      </button>
                    ))}
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-[#EAE3D5] space-y-4">
                    <div className="flex items-center justify-between">
                      <span className="text-sm text-[#8C7A6B]">総合評価</span>
                      <div className="flex items-center gap-2">
                        <span className={`w-5 h-5 ${formData.score >= 4 ? 'text-yellow-500' : 'text-[#D1C7B1]'}`}><Icons.Star /></span>
                        <span className="font-bold text-lg">{formData.score.toFixed(1)}</span>
                      </div>
                    </div>
                    <input type="range" min="1" max="5" step="0.1" value={formData.score} onChange={e => setFormData({...formData, score: parseFloat(e.target.value)})} className="w-full accent-yellow-500" />
                    <textarea 
                      placeholder="メモ（雑味、酸味の質など）" 
                      className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      rows="2" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})}
                    ></textarea>
                  </div>
                </section>

                <button 
                  onClick={handleSave}
                  className="w-full bg-[#A67C52] hover:bg-[#8B653F] text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-95 flex justify-center items-center gap-2"
                >
                  <span className="w-5 h-5"><Icons.Plus /></span> 記録を保存する
                </button>
              </div>
            )}

            {/* === HISTORY TAB === */}
            {activeTab === 'history' && (
              <div className="space-y-4 animate-in fade-in duration-300">
                <div className="flex justify-between items-end border-b border-[#EAE3D5] pb-2 mb-4">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest">Brewing History</h2>
                  <div className="text-xs text-[#8C7A6B]">全 {logs.length} 件 (左スワイプで削除)</div>
                </div>
                
                {logs.length === 0 ? <p className="text-center text-[#8C7A6B] py-10">まだ記録がありません</p> : logs.map((log) => (
                  <SwipeToDelete key={log.id} onDelete={() => handleDeleteLog(log.id)}>
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <div className="text-xs text-[#8C7A6B] mb-1">{log.date} {log.time}</div>
                        <h3 className="font-bold text-lg leading-tight">{log.beans}</h3>
                        <div className="text-xs text-[#A67C52] mt-0.5">{log.roastery} / {log.roast}</div>
                      </div>
                      <div className="flex items-center gap-1 bg-[#FDFBF7] px-2 py-1 rounded-lg border border-[#EAE3D5]">
                        <span className="w-3 h-3 text-yellow-500"><Icons.Star /></span>
                        <span className="font-bold text-sm">{log.score.toFixed(1)}</span>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-2 my-3 bg-[#FDFBF7] p-2 rounded-lg border border-[#EAE3D5]">
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">Ratio</div>
                        <div className="text-xs font-semibold">1:{Math.round(log.waterWeight/log.beansWeight)}</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">Temp</div>
                        <div className="text-xs font-semibold">{log.temp}℃</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">Grind</div>
                        <div className="text-xs font-semibold">{log.grind}</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">Filter</div>
                        <div className="text-xs font-semibold truncate px-1">{log.filter}</div>
                      </div>
                    </div>

                    <div className="flex justify-between items-end">
                      <div className="flex flex-wrap gap-1">
                        <span className="text-[10px] font-semibold bg-[#EAE3D5] text-[#4A3B32] px-2 py-0.5 rounded-md">{log.dripper}</span>
                        {log.flavors && log.flavors.map(f => (
                          <span key={f} className="text-[10px] bg-white border border-[#EAE3D5] text-[#A67C52] px-2 py-0.5 rounded-full">{f}</span>
                        ))}
                      </div>
                      <span className="text-xs text-[#8C7A6B] italic ml-2 truncate max-w-[120px]">"{log.memo}"</span>
                    </div>
                  </SwipeToDelete>
                ))}
              </div>
            )}

            {/* === RECIPE GENERATOR TAB === */}
            {activeTab === 'recipe' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="mb-2">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest border-b border-[#EAE3D5] pb-2">AI Recipe Generator</h2>
                  <p className="text-xs text-[#8C7A6B] mt-2">入力できる範囲で条件を入力してください。空欄（おまかせ）の項目は、AIが豆の特徴に合わせて最適な設定を推測・提案します。</p>
                </div>

                <div className="space-y-4 bg-white p-5 rounded-xl border border-[#EAE3D5] shadow-sm">
                  <div>
                    <label className="text-xs font-bold text-[#8C7A6B] mb-1 block">豆の情報（※ここだけは入力してください）</label>
                    <input 
                      type="text" placeholder="例: エチオピア イルガチェフェ 浅煎り" 
                      className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={recipeInput.beans} onChange={e => setRecipeInput({...recipeInput, beans: e.target.value})}
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <select 
                      className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={recipeInput.roast} onChange={e => setRecipeInput({...recipeInput, roast: e.target.value})}
                    >
                      <option value="">焙煎度: おまかせ</option>
                      <option value="ライト">ライトロースト</option>
                      <option value="ミディアム">ミディアムロースト</option>
                      <option value="ダーク">ダークロースト</option>
                    </select>
                    <select 
                      className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                      value={recipeInput.dripper} onChange={e => setRecipeInput({...recipeInput, dripper: e.target.value})}
                    >
                      <option value="">器具: おまかせ</option>
                      <option value="Origami">Origami</option>
                      <option value="Hario V60">Hario V60</option>
                      <option value="Kalita Wave">Kalita Wave</option>
                    </select>
                  </div>

                  <div className="grid grid-cols-2 gap-3 items-end">
                    <div>
                      <label className="text-xs font-bold text-[#8C7A6B] mb-1 block">使う豆の量</label>
                      <div className="relative">
                        <input 
                          type="number" min="10" max="40" placeholder="おまかせ"
                          className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52] pr-8"
                          value={recipeInput.beansWeight} onChange={e => setRecipeInput({...recipeInput, beansWeight: e.target.value})}
                        />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-[#8C7A6B]">g</span>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-[#8C7A6B] mb-1 block">味の希望</label>
                      <input 
                        type="text" placeholder="おまかせ（例: 甘み）" 
                        className="w-full bg-[#FDFBF7] border border-[#EAE3D5] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#A67C52]"
                        value={recipeInput.tasteGoal} onChange={e => setRecipeInput({...recipeInput, tasteGoal: e.target.value})}
                      />
                    </div>
                  </div>

                  <button 
                    onClick={generateOfflineRecipe} disabled={isGenerating || !recipeInput.beans}
                    className="w-full bg-[#3E3228] hover:bg-[#2A221B] disabled:bg-[#B8AD9E] text-white font-bold py-3 rounded-xl shadow-md transition-all flex justify-center items-center gap-2 mt-2"
                  >
                    <span className="w-5 h-5">{isGenerating ? <Icons.Loader2 /> : <Icons.Compass />}</span>
                    {isGenerating ? "レシピを考案中..." : "AIにレシピを提案してもらう"}
                  </button>
                </div>

                {suggestedRecipe && !isGenerating && (
                  <div className="bg-white rounded-xl p-6 border border-[#EAE3D5] shadow-sm space-y-6 relative overflow-hidden">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="w-5 h-5 text-[#A67C52]"><Icons.Sparkles /></span>
                      <h3 className="font-bold text-lg text-[#3E3228]">提案レシピ</h3>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-2 bg-[#FDFBF7] p-3 rounded-lg border border-[#EAE3D5]">
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">豆量</div>
                        <div className="text-sm font-bold text-[#A67C52]">{suggestedRecipe.beansWeight}g</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">湯量</div>
                        <div className="text-sm font-bold text-[#A67C52]">{suggestedRecipe.waterWeight}g</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">温度</div>
                        <div className="text-sm font-bold text-[#A67C52]">{suggestedRecipe.temp}℃</div>
                      </div>
                      <div className="text-center">
                        <div className="text-[10px] text-[#8C7A6B]">挽き目</div>
                        <div className="text-sm font-bold text-[#A67C52]">{suggestedRecipe.grind}</div>
                      </div>
                    </div>
                    
                    <div className="flex gap-2">
                      <span className="text-xs bg-[#EAE3D5] text-[#4A3B32] px-2 py-1 rounded-md font-semibold">推奨: {suggestedRecipe.roast}</span>
                      <span className="text-xs bg-[#EAE3D5] text-[#4A3B32] px-2 py-1 rounded-md font-semibold">推奨: {suggestedRecipe.dripper}</span>
                    </div>

                    <div>
                      <h4 className="text-xs font-bold text-[#8C7A6B] mb-2 uppercase">Barista Advice</h4>
                      <p className="text-sm leading-relaxed text-[#4A3B32] whitespace-pre-wrap">{suggestedRecipe.advice}</p>
                    </div>

                    <div>
                      <h4 className="text-xs font-bold text-[#8C7A6B] mb-4 uppercase">Brewing Steps</h4>
                      <div className="space-y-5 relative border-l-2 border-[#EAE3D5] ml-2 pl-5">
                        {suggestedRecipe.steps.map((step, idx) => (
                          <div key={idx} className="relative">
                            <div className="absolute -left-[27px] top-1 w-3 h-3 rounded-full bg-[#A67C52] ring-4 ring-white"></div>
                            <div className="flex items-baseline gap-2 mb-1">
                              <span className="font-bold text-[#3E3228] w-10">{step.time}</span>
                              <span className="text-xs font-semibold text-[#8C7A6B] bg-[#FDFBF7] px-2 py-0.5 rounded-md border border-[#EAE3D5]">
                                ~ {step.water}
                              </span>
                            </div>
                            <div className="text-sm text-[#4A3B32]">{step.description}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* === INSIGHT TAB === */}
            {activeTab === 'insight' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="bg-gradient-to-br from-[#A67C52] to-[#8B653F] p-6 rounded-2xl text-white shadow-md relative overflow-hidden">
                  <span className="absolute top-4 right-4 text-white/20 w-24 h-24"><Icons.Activity /></span>
                  <h2 className="text-sm font-bold text-white/80 uppercase tracking-widest mb-1">Data Insight</h2>
                  <p className="text-xl font-bold mb-4 relative z-10">最新の抽出分析</p>
                  
                  {logs.length > 0 ? (
                    <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4 border border-white/20 relative z-10">
                      <div className="text-xs text-white/80 mb-2">Target: {logs[0].beans} ({logs[0].date})</div>
                      <h3 className="font-bold text-lg mb-2">{generateAIFeedback(logs[0]).title}</h3>
                      <p className="text-sm leading-relaxed text-white/90">
                        {generateAIFeedback(logs[0]).message}
                      </p>
                    </div>
                  ) : (
                    <p className="text-sm relative z-10">記録がありません。</p>
                  )}
                </div>

                <section className="space-y-4 mt-8">
                  <h2 className="text-sm font-bold text-[#8C7A6B] uppercase tracking-widest border-b border-[#EAE3D5] pb-2">Your Best Profiles</h2>
                  {logs.filter(l => l.score >= 4.5).length === 0 ? <p className="text-sm text-[#8C7A6B]">スコア4.5以上の記録がまだありません。</p> : 
                   logs.filter(l => l.score >= 4.5).map(bestLog => (
                    <div key={`best-${bestLog.id}`} className="bg-white p-4 rounded-xl border-l-4 border-[#A67C52] shadow-sm mb-3">
                      <div className="flex justify-between items-start">
                        <div>
                          <span className="font-bold text-[#3E3228] block">{bestLog.beans}</span>
                          <span className="text-[10px] text-[#8C7A6B]">{bestLog.roastery}</span>
                        </div>
                        <span className="text-[#A67C52] font-bold flex items-center gap-1 bg-[#FDFBF7] px-2 py-1 rounded-md border border-[#EAE3D5]">
                          <span className="w-3 h-3 text-yellow-500"><Icons.Star /></span> {bestLog.score}
                        </span>
                      </div>
                      <div className="text-xs text-[#8C7A6B] mt-3 bg-[#FDFBF7] p-2 rounded-lg border border-[#EAE3D5]">
                        {bestLog.dripper} / {bestLog.filter} / 挽き目{bestLog.grind} / {bestLog.temp}℃ / {bestLog.beansWeight}g:{bestLog.waterWeight}g
                      </div>
                      <div className="text-xs mt-2 text-right italic">"{bestLog.memo}"</div>
                    </div>
                  ))}
                </section>
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-[#EAE3D5] pb-safe z-20">
            <div className="flex justify-between items-center px-4 py-3">
              <button onClick={() => setActiveTab('record')} className={`flex flex-col items-center gap-1 transition-colors w-1/4 ${activeTab === 'record' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}>
                <span className="w-6 h-6"><Icons.Plus /></span><span className="text-[10px] font-bold">Record</span>
              </button>
              <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 transition-colors w-1/4 ${activeTab === 'history' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}>
                <span className="w-6 h-6"><Icons.List /></span><span className="text-[10px] font-bold">History</span>
              </button>
              <button onClick={() => setActiveTab('recipe')} className={`flex flex-col items-center gap-1 transition-colors w-1/4 ${activeTab === 'recipe' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}>
                <span className="w-6 h-6"><Icons.Compass /></span><span className="text-[10px] font-bold">Recipe</span>
              </button>
              <button onClick={() => setActiveTab('insight')} className={`flex flex-col items-center gap-1 transition-colors w-1/4 ${activeTab === 'insight' ? 'text-[#A67C52]' : 'text-[#B8AD9E]'}`}>
                <span className="w-6 h-6"><Icons.Sparkles /></span><span className="text-[10px] font-bold">Insight</span>
              </button>
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
